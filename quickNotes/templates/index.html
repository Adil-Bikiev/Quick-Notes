<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quick Notes</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f0f0; padding: 30px; }

        h1 { margin-bottom: 24px; font-size: 28px; }

        .toolbar { margin-bottom: 20px; }
        .toolbar button { padding: 10px 18px; margin-right: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; background: #6366f1; color: white; }
        .toolbar button:hover { background: #4f46e5; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; padding: 30px; border-radius: 10px; width: 460px; }
        .modal h2 { margin-bottom: 16px; }
        .modal input, .modal textarea { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
        .modal textarea { height: 120px; resize: vertical; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .modal-actions button { padding: 9px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn-save { background: #6366f1; color: white; }
        .btn-save:hover { background: #4f46e5; }
        .btn-cancel { background: #e5e7eb; color: #333; }
        .btn-cancel:hover { background: #d1d5db; }

        /* Notes grid */
        .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
        .note-card { background: white; padding: 18px; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 8px; }
        .note-card h3 { font-size: 17px; }
        .note-card p { color: #555; font-size: 14px; flex: 1; }
        .note-card small { color: #aaa; font-size: 12px; }
        .note-actions { display: flex; gap: 8px; margin-top: 6px; }
        .note-actions button { flex: 1; padding: 7px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .btn-edit { background: #f59e0b; color: white; }
        .btn-edit:hover { background: #d97706; }
        .btn-delete { background: #ef4444; color: white; }
        .btn-delete:hover { background: #dc2626; }

        .empty { color: #aaa; font-size: 16px; margin-top: 40px; text-align: center; }
    </style>
</head>
<body>

<h1>📝 Quick Notes</h1>

<div class="toolbar">
    <button onclick="openCreate()">+ Add Note</button>
    <button onclick="loadNotes()">↻ Refresh</button>
</div>

<div class="notes-grid" id="notes"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <h2 id="modal-title">New Note</h2>
        <input type="text" id="input-title" placeholder="Title">
        <textarea id="input-content" placeholder="Content..."></textarea>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-save" onclick="saveNote()">Save</button>
        </div>
    </div>
</div>

<script>
    let editingId = null;

    async function loadNotes() {
        const res = await fetch('/api/notes/');
        const data = await res.json();
        const container = document.getElementById('notes');
        container.innerHTML = '';

        if (data.length === 0) {
            container.innerHTML = '<p class="empty">No notes yet. Click "+ Add Note" to create one.</p>';
            return;
        }

        data.forEach(note => {
            const card = document.createElement('div');
            card.className = 'note-card';
            card.innerHTML = `
                <h3>${note.title}</h3>
                <p>${note.content || '—'}</p>
                <small>Updated: ${new Date(note.updated_at).toLocaleString('en')}</small>
                <div class="note-actions">
                    <button class="btn-edit" onclick="openEdit(${note.id}, \`${note.title}\`, \`${note.content}\`)">Edit</button>
                    <button class="btn-delete" onclick="deleteNote(${note.id})">Delete</button>
                </div>`;
            container.appendChild(card);
        });
    }

    function openCreate() {
        editingId = null;
        document.getElementById('modal-title').textContent = 'New Note';
        document.getElementById('input-title').value = '';
        document.getElementById('input-content').value = '';
        document.getElementById('modal').classList.add('active');
    }

    function openEdit(id, title, content) {
        editingId = id;
        document.getElementById('modal-title').textContent = 'Edit Note';
        document.getElementById('input-title').value = title;
        document.getElementById('input-content').value = content;
        document.getElementById('modal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
    }

    async function saveNote() {
        const title = document.getElementById('input-title').value.trim();
        const content = document.getElementById('input-content').value.trim();
        if (!title) { alert('Title is required.'); return; }

        const url = editingId ? `/api/notes/${editingId}/` : '/api/notes/';
        const method = editingId ? 'PUT' : 'POST';

        await fetch(url, {
            method,
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken'),
            },
            body: JSON.stringify({ title, content }),
        });

        closeModal();
        loadNotes();
    }

    async function deleteNote(id) {
        if (!confirm('Delete this note?')) return;
        await fetch(`/api/notes/${id}/`, {
            method: 'DELETE',
            headers: { 'X-CSRFToken': getCookie('csrftoken') },
        });
        loadNotes();
    }

    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
    }

    loadNotes();
</script>
</body>
</html>
