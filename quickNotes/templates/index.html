<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quick Notes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }
        .header h1 {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1px;
        }
        .header p {
            margin-top: 8px;
            font-size: 16px;
            opacity: 0.85;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
        }
        .btn-add {
            background: white;
            color: #6366f1;
            border: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(0,0,0,0.25);
        }

        /* Notes grid */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .note-card {
            background: white;
            border-radius: 16px;
            padding: 22px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }
        .note-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }
        .note-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.15);
        }
        .note-card h3 {
            font-size: 17px;
            font-weight: 600;
            color: #1e1b4b;
        }
        .note-card p {
            font-size: 14px;
            color: #6b7280;
            flex: 1;
            line-height: 1.6;
        }
        .note-card small {
            font-size: 12px;
            color: #c4b5fd;
            font-weight: 500;
        }
        .note-actions {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }
        .note-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: opacity 0.15s;
        }
        .note-actions button:hover { opacity: 0.85; }
        .btn-edit { background: #ede9fe; color: #6d28d9; }
        .btn-delete { background: #fee2e2; color: #dc2626; }

        /* Empty state */
        .empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: white;
            opacity: 0.8;
        }
        .empty .empty-icon { font-size: 56px; margin-bottom: 16px; }
        .empty p { font-size: 18px; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: white;
            padding: 36px;
            border-radius: 20px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        .modal h2 {
            font-size: 22px;
            font-weight: 700;
            color: #1e1b4b;
            margin-bottom: 20px;
        }
        .modal input, .modal textarea {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 14px;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        .modal input:focus, .modal textarea:focus {
            border-color: #6366f1;
        }
        .modal textarea { height: 130px; resize: vertical; }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 4px;
        }
        .modal-actions button {
            padding: 11px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: opacity 0.15s;
        }
        .modal-actions button:hover { opacity: 0.85; }
        .btn-save { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-cancel { background: #f3f4f6; color: #374151; }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1>📝 Quick Notes</h1>
        <p>Simple and fast notes — always at hand</p>
    </div>

    <div class="toolbar">
        <button class="btn-add" onclick="openCreate()">+ New Note</button>
    </div>

    <div class="notes-grid" id="notes"></div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <h2 id="modal-title">New Note</h2>
        <input type="text" id="input-title" placeholder="Title">
        <textarea id="input-content" placeholder="What's on your mind?"></textarea>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-save" onclick="saveNote()">Save</button>
        </div>
    </div>
</div>

<script>
    let editingId = null;

    async function loadNotes() {
        const res = await fetch('/api/notes/');
        const data = await res.json();
        const container = document.getElementById('notes');
        container.innerHTML = '';

        if (data.length === 0) {
            container.innerHTML = `
                <div class="empty">
                    <div class="empty-icon">🗒️</div>
                    <p>No notes yet. Click "+ New Note" to get started!</p>
                </div>`;
            return;
        }

        data.forEach(note => {
            const card = document.createElement('div');
            card.className = 'note-card';
            card.innerHTML = `
                <h3>${note.title}</h3>
                <p>${note.content || '—'}</p>
                <small>Updated: ${new Date(note.updated_at).toLocaleString('en')}</small>
                <div class="note-actions">
                    <button class="btn-edit" onclick="openEdit(${note.id}, \`${note.title}\`, \`${note.content}\`)">✏️ Edit</button>
                    <button class="btn-delete" onclick="deleteNote(${note.id})">🗑️ Delete</button>
                </div>`;
            container.appendChild(card);
        });
    }

    function openCreate() {
        editingId = null;
        document.getElementById('modal-title').textContent = 'New Note';
        document.getElementById('input-title').value = '';
        document.getElementById('input-content').value = '';
        document.getElementById('modal').classList.add('active');
        document.getElementById('input-title').focus();
    }

    function openEdit(id, title, content) {
        editingId = id;
        document.getElementById('modal-title').textContent = 'Edit Note';
        document.getElementById('input-title').value = title;
        document.getElementById('input-content').value = content;
        document.getElementById('modal').classList.add('active');
        document.getElementById('input-title').focus();
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
    }

    async function saveNote() {
        const title = document.getElementById('input-title').value.trim();
        const content = document.getElementById('input-content').value.trim();
        if (!title) { alert('Title is required.'); return; }

        const url = editingId ? `/api/notes/${editingId}/` : '/api/notes/';
        const method = editingId ? 'PUT' : 'POST';

        await fetch(url, {
            method,
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken'),
            },
            body: JSON.stringify({ title, content }),
        });

        closeModal();
        loadNotes();
    }

    async function deleteNote(id) {
        if (!confirm('Delete this note?')) return;
        await fetch(`/api/notes/${id}/`, {
            method: 'DELETE',
            headers: { 'X-CSRFToken': getCookie('csrftoken') },
        });
        loadNotes();
    }

    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
    }

    document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    loadNotes();
</script>
</body>
</html>
